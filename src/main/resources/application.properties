spring.application.name=demo
server.port=8080
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/demo?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.servlet.multipart.max-file-size=1MB
spring.servlet.multipart.max-request-size=1MB
server.max-http-request-header-size=8KB

auth.service.base-url=http://localhost:4001

# Comma-separated IPs of trusted reverse proxies (nginx, ALB, etc.).
# X-Forwarded-For is only trusted when the direct caller matches one of these.
rate.limit.trusted-proxies=127.0.0.1,::1
